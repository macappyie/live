<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoneyAssure</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0d10;
color:white;
}

.navbar{
background:#111827;
}

.card{
background:#1f2937;
color:white;
border-radius:15px;
}

.btn-primary{
background:#00bcd4;
border:none;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand" href="/">MoneyAssure</a>

<div>

<a href="/" class="btn btn-outline-light btn-sm">Home</a>

<a href="/login" class="btn btn-warning btn-sm">Login</a>

<a href="/register" class="btn btn-success btn-sm">Register</a>

</div>

</div>

</nav>

<div class="container mt-5">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}

{% for category,message in messages %}

<div class="alert alert-{{category}}">

{{message}}

</div>

{% endfor %}

{% endif %}
{% endwith %}

{% block content %}

{% endblock %}

</div>

</body>

</html>
